<!-- Account Modal -->
<div class="modal" id="accountModal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle">Add Account</h3>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <form id="accountForm" onsubmit="saveAccount(event)">
      <input type="hidden" id="accountId" />
      <div class="form-group">
        <label class="form-label">Account Type</label>
        <input type="hidden" id="accountType" value="orchids" />
        <input class="form-input" id="accountTypeDisplay" value="Orchids" readonly />
      </div>
      <div class="form-group">
        <label class="form-label" id="tokenLabel">__session</label>
        <div class="account-token-actions" id="warpLocalImportActions" hidden>
          <button type="button" class="btn btn-secondary btn-sm" onclick="selectWarpUserFile()">Upload User JSON / token and save</button>
          <input type="file" id="warpUserFileInput" hidden />
        </div>
        <textarea class="form-input account-token-input" id="clientCookie" rows="8" wrap="off" spellcheck="false" required placeholder="One __session per line"></textarea>
        <small id="tokenHint" class="helper-text">Orchids currently only supports __session. One per line when adding; only the first line is used when editing</small>
      </div>
      <div class="form-group">
        <label class="form-label">
          <label class="toggle">
            <input type="checkbox" id="enabled" checked />
            <span class="toggle-slider"></span>
          </label>
          &nbsp;&nbsp;Enable Account
        </label>
      </div>
      <div class="account-import-status" id="accountImportStatus" hidden></div>
      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px">
        Save
      </button>
    </form>
  </div>
</div>
