<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - CodeFreeMax</title>
    <!-- Use the refined main.css -->
    <link rel="stylesheet" href="css/main.css"> 
</head>
<body class="login-body">
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="grid-orbit"></div>
    </div>

    <div class="login-card">
        <div class="login-brand">
            <div class="logo">O</div>
            <div>
                <div class="title">Console</div>
                <div class="login-brand-subtitle">Secure admin access</div>
            </div>
        </div>

        <div class="login-hero">
            <div class="login-kicker">Admin access</div>
            <h1>Admin Login</h1>
            <p>Enter the Console to manage channel accounts, model configurations, and operational status centrally.</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">ID</span>
                    <input type="text" id="username" class="form-input" placeholder="Enter Username" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Admin Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">PW</span>
                    <input type="password" id="password" class="form-input" placeholder="Please enter password" required autocomplete="current-password">
                    <button type="button" class="btn-icon password-toggle" id="passwordToggle" aria-label="Toggle password visibility">••</button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary login-submit" id="loginBtn">
                <div class="loading-spinner" id="spinner" style="display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite;"></div>
                <span>Login</span>
            </button>
        </form>

        <div class="login-links">
            <a href="https://github.com/zhangdailin/Orchids-2api" target="_blank">GitHub</a>
            <span>•</span>
            <a href="#">Documentation & Tutorials</a>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span class="toast-mark">ER</span>
        <span id="toastMessage">Login failed, please check your account and password</span>
    </div>

    <style>
        /* Inline quick spinner animation if not in main.css yet, though logic suggests main.css covers most things. 
           Adding specific spinner keyframes just in case */
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

    <script>
        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const spinner = document.getElementById('spinner');
        const passwordInput = document.getElementById('password');
        const passwordToggle = document.getElementById('passwordToggle');
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toastMessage');

        passwordToggle.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            passwordToggle.textContent = type === 'password' ? '••' : 'ON';
        });

        function showToast(msg) {
            toastMessage.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value;
            const password = passwordInput.value;

            // UI loading state
            loginBtn.disabled = true;
            spinner.style.display = 'block';
            loginBtn.querySelector('span').textContent = 'Logging in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    window.location.href = './'; 
                } else {
                    const error = await response.text();
                    showToast(error || 'Login failed, please try again');
                }
            } catch (err) {
                showToast('Network connection failed');
            } finally {
                loginBtn.disabled = false;
                spinner.style.display = 'none';
                loginBtn.querySelector('span').textContent = 'Login';
            }
        });
    </script>
</body>
</html>
